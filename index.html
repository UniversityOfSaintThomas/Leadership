function SectionTitle({ kicker, children }) {
  return (
    <div className="mb-8">
      {kicker && (
        <div
          className="text-xs font-semibold tracking-[0.25em] uppercase mb-2"
          style={{ color: PURPLE_LIGHT }}
        >
          {kicker}
        </div>
      )}
      <h2
        className="text-3xl md:text-4xl font-bold leading-tight"
        style={{ color: PURPLE_DARK, fontFamily: "Georgia, 'Times New Roman', serif" }}
      >
        {children}
      </h2>
      <div className="mt-4 h-1 w-20 rounded-full" style={{ background: PURPLE }} />
    </div>
  );
}

function Callout({ children, tone = "info" }) {
  const tones = {
    info: { bg: "#f0ebf7", border: PURPLE, icon: "ℹ️" },
    warn: { bg: "#fdf3e7", border: "#c9762b", icon: "⚠️" },
  };
  const t = tones[tone];
  return (
    <div
      className="rounded-lg p-4 my-4 text-sm leading-relaxed flex gap-3"
      style={{ background: t.bg, borderLeft: `4px solid ${t.border}`, color: GRAY }}
    >
      <span className="select-none">{t.icon}</span>
      <div>{children}</div>
    </div>
  );
}

function Accordion({ title, children, defaultOpen = false }) {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div className="border rounded-xl overflow-hidden mb-3" style={{ borderColor: "#e2dced" }}>
      <button
        onClick={() => setOpen((o) => !o)}
        className="w-full flex items-center justify-between px-5 py-4 text-left transition-colors"
        style={{ background: open ? GRAY_LIGHT : "white", color: PURPLE_DARK }}
      >
        <span className="font-semibold text-base md:text-lg">{title}</span>
        <span
          className="text-xl transition-transform duration-300 shrink-0 ml-4"
          style={{ transform: open ? "rotate(45deg)" : "rotate(0deg)", color: PURPLE }}
        >
          +
        </span>
      </button>
      <div
        className="transition-all duration-300 ease-in-out overflow-hidden"
        style={{ maxHeight: open ? "4000px" : "0px" }}
      >
        <div className="px-5 py-4 text-sm md:text-[15px] leading-relaxed" style={{ color: GRAY }}>
          {children}
        </div>
      </div>
    </div>
  );
}

function isEmpty(courses) {
  return courses.length === 1 && courses[0] === "No courses";
}

function TermCard({ term }) {
  const empty = isEmpty(term.courses);
  return (
    <div
      className="rounded-lg p-4 border h-full"
      style={{
        borderColor: term.residency ? PURPLE : "#e2dced",
        background: term.residency ? "#f0ebf7" : empty ? "#fafafa" : "white",
      }}
    >
      <div className="flex items-center justify-between mb-2">
        <span className="text-xs font-bold uppercase tracking-wider" style={{ color: PURPLE }}>
          {term.term}
        </span>
        {term.residency && (
          <span
            className="text-[10px] font-bold px-2 py-0.5 rounded-full text-white"
            style={{ background: PURPLE }}
          >
            RESIDENCY
          </span>
        )}
        {term.grad && (
          <span
            className="text-[10px] font-bold px-2 py-0.5 rounded-full text-white"
            style={{ background: "#2e7d32" }}
          >
            🎓 GRADUATION
          </span>
        )}
      </div>
      <ul className="space-y-1.5">
        {term.courses.map((c, i) => (
          <li
            key={i}
            className={`text-[13px] leading-snug ${empty ? "italic" : ""}`}
            style={{ color: empty ? "#aaa" : GRAY }}
          >
            {!empty && c.startsWith("Optional") ? "○ " : !empty ? "● " : ""}
            {c}
          </li>
        ))}
      </ul>
    </div>
  );
}

              <li>Ethical Considerations</li>
              <li>Validity and Reliability</li>
              <li>Researcher Experience and Bias (Reflexive Statement)</li>
              <li>Remove the timetable developed in the proposal</li>
              <li>Chapter Summary</li>
            </ul>
          </div>

          <div>
            <p className="font-semibold" style={{ color: PURPLE_DARK }}>Chapter Four: Findings</p>
            <ul className="list-disc pl-5 mt-1 space-y-1">
              <li>Chapter introduction previewing the contents and organization of the chapter</li>
              <li>Report the findings using the actual data from the data collection section</li>
              <li>Address each research question</li>
              <li>
                Quantitative:
                <ul className="list-[circle] pl-5 mt-1">
                  <li>Provide a detailed description of quantitative results/findings</li>
                  <li>Use tables for statistical findings</li>
                </ul>
              </li>
              <li>
                Qualitative:
                <ul className="list-[circle] pl-5 mt-1">
                  <li>Identify themes with representative quotes that account for all participants (judicious use of quotes at the discretion of the chair)</li>
                  <li>Use figures and charts to illustrate the main findings</li>
                </ul>
              </li>
              <li>Chapter Summary</li>
            </ul>
          </div>

          <div>
            <p className="font-semibold" style={{ color: PURPLE_DARK }}>Chapter Five: Theoretical Analysis and Discussion of Findings</p>
            <ul className="list-disc pl-5 mt-1 space-y-1">
              <li>Chapter introduction previewing the contents and organization of the chapter</li>
              <li>Use specific components of the analytical theories (or their definitions) to analyze your findings</li>
              <li>Discuss connections between the theories and findings</li>
              <li>Discuss how the study bridges the gap in the literature and aligns with or challenges prior studies</li>
              <li>Avoid excessive use of quotes or block quotes</li>
              <li>Chapter Summary</li>
            </ul>
          </div>

          <div>
            <p className="font-semibold" style={{ color: PURPLE_DARK }}>Chapter Six: Summary, Implications, and Recommendations</p>
            <ul className="list-disc pl-5 mt-1 space-y-1">
              <li>Summary of study and findings (no more than one or two pages)</li>
              <li>
                Implications:
                <ul className="list-[circle] pl-5 mt-1">
                  <li>How the study results may impact participants</li>
                  <li>Restate the significance</li>
                  <li>Generalization of findings</li>
                  <li>So what?</li>
                </ul>
              </li>
              <li>
                Recommendations:
                <ul className="list-[circle] pl-5 mt-1">
                  <li>Now what?</li>
                  <li>For policy-makers/leaders in the field</li>
                  <li>For future studies</li>
                </ul>
              </li>
              <li>Limitations of the study</li>
              <li>Closing thoughts</li>
            </ul>
          </div>
        </div>
      </Accordion>

      <Accordion title="Section E — Dissertation Rubric">
        <p className="mb-2">Evaluation criteria include:</p>
        <ul className="list-disc pl-5 space-y-1">
          <li>Scholarly writing and APA format</li>
          <li>Problem statement clarity and significance</li>
          <li>Literature review depth and synthesis</li>
          <li>Methodological rigor and alignment</li>
          <li>Data analysis quality</li>
          <li>Contribution to field</li>
          <li>Implications and recommendations</li>
        </ul>
        <a
          href="#"
          className="inline-block mt-3 font-semibold underline"
          style={{ color: PURPLE }}
        >
          Open the full rubric →
        </a>
      </Accordion>

      <Accordion title="Section F — Creating a Table of Contents">
        <div className="rounded-lg overflow-hidden mb-4" style={{ aspectRatio: "16/9", maxWidth: 560 }}>
          <iframe
            className="w-full h-full"
            src="https://www.youtube.com/embed/WqM6-yz89X8"
            title="Creating a Table of Contents"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowFullScreen
            style={{ border: 0 }}
          />
        </div>
        <p className="mb-2 font-semibold" style={{ color: PURPLE_DARK }}>Step-by-step (Microsoft Word):</p>
        <ol className="list-decimal pl-5 space-y-1">
          <li>Apply Heading 1 / Heading 2 styles to your chapter and section titles.</li>
          <li>Place your cursor where the TOC should appear.</li>
          <li>Go to <em>References → Table of Contents</em> and choose an automatic style.</li>
          <li>Insert page numbers via <em>Insert → Page Number</em>, then format front matter with lowercase roman numerals.</li>
          <li>Right-click the TOC and select <em>Update Field</em> whenever headings change.</li>
        </ol>
        <p className="mt-3">All formatting should follow <strong>APA 7th edition</strong> requirements.</p>
      </Accordion>
    </div>
  );
}

/* ====================================================================== */

function App() {
  const [active, setActive] = useState("overview");
  const [menuOpen, setMenuOpen] = useState(false);
  const [query, setQuery] = useState("");
  const [showResults, setShowResults] = useState(false);
  const contentRef = useRef(null);

  const go = (tab) => {
    setActive(tab);
    setMenuOpen(false);
    setShowResults(false);
    setQuery("");
    if (contentRef.current) {
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  };

  const results = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return [];
    return SEARCH_INDEX.filter(
      (s) => s.title.toLowerCase().includes(q) || s.text.toLowerCase().includes(q)
    );
  }, [query]);

  const renderTab = () => {
    switch (active) {
      case "overview": return <OverviewTab />;
      case "roadmap": return <RoadmapTab />;
      case "residency": return <ResidencyTab />;
      case "milestones": return <MilestonesTab />;
      case "dissertation": return <DissertationTab />;
      case "forms": return <FormsTab />;
      case "faq": return <FaqTab />;
      default: return <OverviewTab />;
    }
  };

  return (
    <div style={{ background: GRAY_LIGHT, minHeight: "100vh", fontFamily: "'Helvetica Neue', Arial, sans-serif" }}>
      {/* ---------- Header ---------- */}
      <header style={{ background: PURPLE_DARK }} className="text-white">
        <div className="max-w-6xl mx-auto px-5 py-5 flex items-center justify-between gap-4">
          <div className="flex items-center gap-3 min-w-0">
            {/* Logo mark */}
            <div
              className="w-11 h-11 rounded-lg flex items-center justify-center font-bold text-lg shrink-0"
              style={{ background: "white", color: PURPLE_DARK, fontFamily: "Georgia, serif" }}
            >
              St
            </div>
            <div className="min-w-0">
              <div className="font-bold leading-tight truncate" style={{ fontFamily: "Georgia, serif" }}>
                University of St. Thomas
              </div>
              <div className="text-xs opacity-80 truncate">School of Education · Doctoral Program</div>
            </div>
          </div>

          {/* Search */}
          <div className="relative hidden sm:block">
            <input
              value={query}
              onChange={(e) => { setQuery(e.target.value); setShowResults(true); }}
              onFocus={() => setShowResults(true)}
              placeholder="Search the guide…"
              className="rounded-full px-4 py-2 text-sm w-56 outline-none"
              style={{ background: "rgba(255,255,255,0.15)", color: "white" }}
            />
            {showResults && results.length > 0 && (
              <div className="absolute right-0 mt-2 w-72 bg-white rounded-xl shadow-xl overflow-hidden z-50">
                {results.map((r) => (
                  <button
                    key={r.tab}
                    onClick={() => go(r.tab)}
                    className="block w-full text-left px-4 py-3 text-sm hover:bg-gray-50 border-b last:border-0"
                    style={{ color: GRAY, borderColor: "#eee" }}
                  >
                    <span className="font-semibold" style={{ color: PURPLE_DARK }}>{r.title}</span>
                  </button>
                ))}
              </div>
            )}
            {showResults && query && results.length === 0 && (
              <div className="absolute right-0 mt-2 w-72 bg-white rounded-xl shadow-xl px-4 py-3 text-sm z-50" style={{ color: GRAY }}>
                No matches found.
              </div>
            )}
          </div>
        </div>

        {/* ---------- Nav ---------- */}
        <nav style={{ background: PURPLE }}>
          <div className="max-w-6xl mx-auto px-5">
            {/* Mobile toggle */}
            <button
              className="md:hidden w-full text-left py-3 font-semibold flex items-center justify-between"
              onClick={() => setMenuOpen((o) => !o)}
            >
              {TABS.find((t) => t.id === active)?.label}
              <span>{menuOpen ? "▲" : "▼"}</span>
            </button>
            <ul className={`md:flex gap-1 ${menuOpen ? "block pb-3" : "hidden md:flex"}`}>
              {TABS.map((t) => (
                <li key={t.id}>
                  <button
                    onClick={() => go(t.id)}
                    className="px-4 py-3 text-sm font-medium transition-colors block w-full text-left whitespace-nowrap"
                    style={{
                      color: "white",
                      borderBottom: active === t.id ? "3px solid white" : "3px solid transparent",
                      background: active === t.id ? "rgba(255,255,255,0.12)" : "transparent",
                    }}
                  >
                    {t.label}
                  </button>
                </li>
              ))}
            </ul>
          </div>
        </nav>
      </header>

      {/* ---------- Body ---------- */}
      <main ref={contentRef} className="max-w-6xl mx-auto px-5 py-10">
        <div className="lg:grid lg:grid-cols-[1fr_280px] lg:gap-8 items-start">
          <div
            className="rounded-2xl bg-white p-6 md:p-10 shadow-sm"
            style={{ animation: "fade 0.4s ease" }}
            key={active}
          >
            {renderTab()}
          </div>
          <aside className="mt-8 lg:mt-0 lg:sticky lg:top-6">
            <QuickLinks go={go} />
          </aside>
        </div>
      </main>

      {/* ---------- Footer ---------- */}
      <footer style={{ background: PURPLE_DARK }} className="text-white mt-8">
        <div className="max-w-6xl mx-auto px-5 py-8 text-sm">
          <div className="font-bold mb-2" style={{ fontFamily: "Georgia, serif" }}>
            Ed.D. in Educational Leadership and Learning
          </div>
          <p className="opacity-80 mb-3">University of St. Thomas · School of Education</p>
          <p className="opacity-90">
            Program Director: Dr. Chientzu Candace Chou ·{" "}
            <a href="mailto:ccchou@stthomas.edu" className="underline">ccchou@stthomas.edu</a>
          </p>
          <p className="opacity-60 text-xs mt-4">
            This guide is designed to support and encourage you throughout your doctoral journey.
          </p>
        </div>
      </footer>

      <style>{`
        @keyframes fade {
          from { opacity: 0; transform: translateY(8px); }
          to { opacity: 1; transform: translateY(0); }
        }
        input::placeholder { color: rgba(255,255,255,0.7); }
      `}</style>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
